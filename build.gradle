plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.7'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'site.ashenstation'
version = '0.0.1-SNAPSHOT'
description = 'amy-server'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'com.mchange:c3p0:0.11.2'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'com.mybatis-flex:mybatis-flex-spring-boot3-starter:1.11.3'
    implementation 'com.alibaba.fastjson2:fastjson2:2.0.54'
    implementation 'commons-codec:commons-codec:1.18.0'
    implementation 'com.google.guava:guava:33.5.0-jre'
    implementation 'cn.hutool:hutool-core:5.8.25'
    testImplementation 'org.springframework.security:spring-security-test'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    annotationProcessor 'org.projectlombok:lombok'
    annotationProcessor 'com.mybatis-flex:mybatis-flex-processor:1.11.3'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    runtimeOnly 'com.mysql:mysql-connector-j'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    systemProperty "spring.profiles.active", "dev"
}

tasks.named('test') {
    useJUnitPlatform()
}
